  SPAProxyService (SPA token injection proxy), CRMService (customer management),
  StatisticsService (usage analytics backend), and StatisticsDashboard (analytics UI).
  Covers what each does, key endpoints, tech details, and when to use each.

  Trigger phrases: "whydah oauth2, OIDC whydah, OAuth2Service, SPA proxy, SPAProxyService,
  whydah CRM, CRMService, whydah statistics, StatisticsService, StatisticsDashboard,
  whydah analytics, whydah dashboard, token injection, authorize endpoint, userinfo"

